title: Victron
views:
  - title: Overview
    path: overview
    icon: mdi:flash
    cards:
      - type: heading
        heading: System Snapshot
        icon: mdi:home-battery

      - type: entities
        title: Battery Status
        show_header_toggle: false
        entities:
          - entity: sensor.shunt_main_charge
            name: State of Charge
          - entity: sensor.shunt_main_dc_bus_voltage
            name: Voltage
          - entity: sensor.shunt_main_dc_bus_current
            name: Current
          - entity: sensor.shunt_main_power
            name: Power
          - entity: sensor.shunt_main_time_to_go
            name: Time To Go
          - entity: sensor.shunt_main_temperature
            name: Battery Temperature

      - type: entities
        title: Solar Charger 226
        show_header_toggle: false
        entities:
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_pv_bus_voltage
            name: Panel Voltage
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_dc_battery_bus_current
            name: Panel Current
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_pv_yield_power
            name: Panel Power

      - type: entities
        title: Solar Charger 224
        show_header_toggle: false
        entities:
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_pv_bus_voltage
            name: Panel Voltage
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_dc_battery_bus_current
            name: Panel Current
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_pv_yield_power
            name: Panel Power

      - type: entities
        title: Total System
        show_header_toggle: false
        entities:
          - entity: sensor.gx_device_pv_power
            name: DC PV Power (System)

      - type: entities
        title: Grid and Load
        show_header_toggle: false
        entities:
          - entity: sensor.inverter_input_power_l1
            name: Grid Power L1
          - entity: sensor.gx_device_consumption_power_l1
            name: AC Consumption L1

  - title: Inverter & VE.Bus
    path: inverter
    icon: mdi:power
    cards:
      - type: heading
        heading: Inverter Control and Status
        icon: mdi:transmission-tower

      - type: entities
        title: VE.Bus Control
        show_header_toggle: false
        entities:
          - entity: select.inverter_mode
            name: Mode
          - entity: sensor.inverter_state
            name: Inverter State

      - type: entities
        title: BMS and Charge Control
        show_header_toggle: false
        entities:
          - entity: sensor.inverter_low_battery_alarm
            name: Low Battery Alarm
          - entity: sensor.inverter_grid_lost_alarm
            name: Grid Lost Alarm
          - entity: sensor.inverter_overload_alarm
            name: Overload Alarm

  - title: Trends
    path: trends
    icon: mdi:chart-line
    cards:
      - type: heading
        heading: Power and Energy Trends
        icon: mdi:chart-box

      - type: history-graph
        title: Battery Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.shunt_main_power
            name: Battery Power

      - type: history-graph
        title: Solar Generation (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_pv_yield_power
            name: Solar 226 Power
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_pv_yield_power
            name: Solar 224 Power
          - entity: sensor.gx_device_pv_power
            name: Total DC PV Power

      - type: history-graph
        title: Grid and Load Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.inverter_input_power_l1
            name: Grid Power
          - entity: sensor.gx_device_consumption_power_l1
            name: AC Consumption

      - type: history-graph
        title: Battery State of Charge (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.shunt_main_charge
            name: State of Charge

      - type: history-graph
        title: Battery Voltages (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.shunt_main_dc_bus_voltage
            name: Battery Voltage
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_pv_bus_voltage
            name: Solar 226 Panel Voltage
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_pv_bus_voltage
            name: Solar 224 Panel Voltage

      - type: history-graph
        title: Temperatures (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.shunt_main_temperature
            name: Battery Temperature

      - type: history-graph
        title: Battery Current (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.shunt_main_dc_bus_current
            name: Battery Current
          - entity: sensor.smartsolar_charger_mppt_100_30_id_279_dc_battery_bus_current
            name: Solar 226 Current
          - entity: sensor.smartsolar_charger_mppt_100_30_id_278_dc_battery_bus_current
            name: Solar 224 Current
