title: Victron
views:
  - title: Overview
    path: overview
    icon: mdi:flash
    cards:
      - type: heading
        heading: System Snapshot
        icon: mdi:home-battery

      - type: entities
        title: Battery Status
        show_header_toggle: false
        entities:
          - entity: sensor.victron_battery_soc
            name: State of Charge
          - entity: sensor.victron_battery_voltage
            name: Voltage
          - entity: sensor.victron_battery_current
            name: Current
          - entity: sensor.victron_battery_power
            name: Power
          - entity: sensor.victron_battery_time_to_go_system
            name: Time To Go
          - entity: sensor.victron_battery_temperature
            name: Battery Temperature

      - type: entities
        title: Solar Charger 226
        show_header_toggle: false
        entities:
          - entity: sensor.victron_solar_panel_voltage
            name: Panel Voltage
          - entity: sensor.victron_solar_panel_current
            name: Panel Current
          - entity: sensor.victron_solar_panel_power
            name: Panel Power

      - type: entities
        title: Solar Charger 224
        show_header_toggle: false
        entities:
          - entity: sensor.victron_solar_224_panel_voltage
            name: Panel Voltage
          - entity: sensor.victron_solar_224_panel_current
            name: Panel Current
          - entity: sensor.victron_solar_224_panel_power
            name: Panel Power

      - type: entities
        title: Total System
        show_header_toggle: false
        entities:
          - entity: sensor.victron_dc_pv_power
            name: DC PV Power (System)

      - type: entities
        title: Grid and Load
        show_header_toggle: false
        entities:
          - entity: sensor.victron_grid_power_l1
            name: Grid Power L1
          - entity: sensor.victron_ac_consumption_l1
            name: AC Consumption L1

  - title: Inverter & VE.Bus
    path: inverter
    icon: mdi:power
    cards:
      - type: heading
        heading: Inverter Control and Status
        icon: mdi:transmission-tower

      - type: entities
        title: VE.Bus Control
        show_header_toggle: false
        entities:
          - entity: select.inverter_mode
            name: Mode
          - entity: sensor.victron_vebus_switch_position
            name: Switch Position

      - type: entities
        title: BMS and Charge Control
        show_header_toggle: false
        entities:
          - entity: sensor.victron_vebus_bms_error
            name: BMS Error
          - entity: sensor.victron_vebus_bms_allow_to_charge
            name: BMS Allow To Charge
          - entity: sensor.victron_vebus_bms_allow_to_discharge
            name: BMS Allow To Discharge

  - title: Trends
    path: trends
    icon: mdi:chart-line
    cards:
      - type: heading
        heading: Power and Energy Trends
        icon: mdi:chart-box

      - type: history-graph
        title: Battery Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_power
            name: Battery Power

      - type: history-graph
        title: Solar Generation (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_solar_panel_power
            name: Solar 226 Power
          - entity: sensor.victron_solar_224_panel_power
            name: Solar 224 Power
          - entity: sensor.victron_dc_pv_power
            name: Total DC PV Power

      - type: history-graph
        title: Grid and Load Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_grid_power_l1
            name: Grid Power
          - entity: sensor.victron_ac_consumption_l1
            name: AC Consumption

      - type: history-graph
        title: Battery State of Charge (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_soc
            name: State of Charge

      - type: history-graph
        title: Battery Voltages (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_voltage
            name: Battery Voltage
          - entity: sensor.victron_solar_panel_voltage
            name: Solar 226 Panel Voltage
          - entity: sensor.victron_solar_224_panel_voltage
            name: Solar 224 Panel Voltage

      - type: history-graph
        title: Temperatures (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_temperature
            name: Battery Temperature

      - type: history-graph
        title: Battery Current (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_current
            name: Battery Current
          - entity: sensor.victron_solar_panel_current
            name: Solar 226 Current
          - entity: sensor.victron_solar_224_panel_current
            name: Solar 224 Current
