title: Victron
views:
  - title: Overview
    path: overview
    icon: mdi:flash
    cards:
      - type: heading
        heading: System Snapshot
        icon: mdi:home-battery

      - type: entities
        title: Battery
        show_header_toggle: false
        entities:
          - entity: sensor.victron_battery_soc
            name: State of Charge
          - entity: sensor.victron_battery_voltage
            name: Voltage
          - entity: sensor.victron_battery_current
            name: Current
          - entity: sensor.victron_battery_power
            name: Power

      - type: entities
        title: Solar
        show_header_toggle: false
        entities:
          - entity: sensor.victron_dc_pv_power
            name: DC PV Power (System)

      - type: entities
        title: Grid and Load
        show_header_toggle: false
        entities:
          - entity: sensor.victron_grid_power_l1
            name: Grid Power L1
          - entity: sensor.victron_ac_consumption_l1
            name: AC Consumption L1

  - title: System Status
    path: status
    icon: mdi:speedometer
    cards:
      - type: heading
        heading: Inverter Status
        icon: mdi:transmission-tower

      - type: entities
        title: VE.Bus Control
        show_header_toggle: false
        entities:
          - entity: sensor.victron_vebus_switch_position
            name: Switch Position

      - type: markdown
        content: |
          ## Missing Entities - Pending Configuration
          
          The following entities are defined in modbus but not yet available in Home Assistant:
          - **Battery**: Temperature, BMS cell temps, Time to Go
          - **Solar**: All panel voltage/current/power (226 & 224)
          - **VE.Bus**: State, BMS Error, Charge/Discharge flags
          - **Alternator**: Voltage and Power
          
          Check the Modbus TCP integration to ensure sensors are scanned and converting properly.

  - title: Trends
    path: trends
    icon: mdi:chart-line
    cards:
      - type: heading
        heading: Power Trends
        icon: mdi:chart-box

      - type: history-graph
        title: Battery Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_battery_power
            name: Battery Power

      - type: history-graph
        title: Grid and Load Power (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.victron_grid_power_l1
            name: Grid Power
          - entity: sensor.victron_ac_consumption_l1
            name: AC Consumption
