- id: '1772611103694'
  alias: Temperature - Freezing Warning/Error
  description: Warn before freezing and alert on freeze.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.sensor_internal_temperature
    below: 3
    for:
      minutes: 5
    id: warning
  - trigger: numeric_state
    entity_id:
    - sensor.sensor_internal_temperature
    below: 0
    for:
      minutes: 2
    id: critical
  - trigger: numeric_state
    entity_id:
    - sensor.sensor_internal_temperature
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: warning
      sequence:
      - action: notify.notify
        data:
          title: "Temperature Warning"
          message: >
            Internal temperature is low: {{ states('sensor.sensor_internal_temperature') }} °C

    - conditions:
      - condition: trigger
        id: critical
      sequence:
      - action: notify.notify
        data:
          title: "Temperature Error - Freezing Risk"
          message: >
            Freezing detected. Internal temperature is {{ states('sensor.sensor_internal_temperature') }} °C
  mode: queued
  max: 5
- id: '1776195340767'
  alias: Victron - Battery Warning/Error
  description: Notify on low battery voltage and low battery charge.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.shunt_main_dc_bus_voltage
    below: 12.8
    id: voltage_warning
  - trigger: numeric_state
    entity_id:
    - sensor.shunt_main_dc_bus_voltage
    below: 12.2
    id: voltage_error
  - trigger: numeric_state
    entity_id:
    - sensor.shunt_main_charge
    below: 25
    id: soc_warning
  - trigger: numeric_state
    entity_id:
    - sensor.shunt_main_charge
    below: 15
    id: soc_error
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: voltage_warning
      sequence:
      - action: notify.notify
        data:
          title: "Victron Battery Warning"
          message: "Battery voltage low: {{ states('sensor.shunt_main_dc_bus_voltage') }} V"

    - conditions:
      - condition: trigger
        id: voltage_error
      sequence:
      - action: notify.notify
        data:
          title: "Victron Battery Error"
          message: "Battery voltage critical: {{ states('sensor.shunt_main_dc_bus_voltage') }} V"

    - conditions:
      - condition: trigger
        id: soc_warning
      sequence:
      - action: notify.notify
        data:
          title: "Victron Battery Warning"
          message: "Battery charge low: {{ states('sensor.shunt_main_charge') }} %"

    - conditions:
      - condition: trigger
        id: soc_error
      sequence:
      - action: notify.notify
        data:
          title: "Victron Battery Error"
          message: "Battery charge critical: {{ states('sensor.shunt_main_charge') }} %"
  mode: single

- id: victron_inverter_alarm_notifications
  alias: Victron - Inverter Alarm Warning/Error
  description: Notify when inverter alarm sensors report a non-OK state.
  triggers:
  - trigger: state
    entity_id:
    - sensor.inverter_grid_lost_alarm
    - sensor.inverter_high_dc_current_alarm
    - sensor.inverter_high_dc_voltage_alarm
    - sensor.inverter_high_temperature_alarm
    - sensor.inverter_low_battery_alarm
    - sensor.inverter_overload_alarm
    - sensor.inverter_phase_rotation_alarm
    - sensor.inverter_ripple_alarm
    - sensor.inverter_temperature_sensor_alarm
    - sensor.inverter_voltage_sensor_alarm
  conditions:
  - condition: template
    value_template: >
      {% set val = trigger.to_state.state | lower | trim %}
      {% set benign = ['0', 'off', 'normal', 'ok', 'none', 'unknown', 'unavailable', 'false', 'clear', 'no alert', 'no alarm', 'no error'] %}
      {{ val not in benign and not val.startswith('no ') }}
  actions:
  - action: notify.notify
    data:
      title: "Victron Inverter Alarm"
      message: >
        Inverter alarm on {{ trigger.to_state.name }}: {{ trigger.to_state.state }}
  mode: queued
  max: 20

