- id: '1772611103694'
  alias: Freezing Notice
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.sensor_internal_temperature
    below: 1
  conditions: []
  actions:
  - action: notify.notify
    metadata: {}
    data:
      message: Freezing temp internal
  mode: single
- id: '1776195340767'
  alias: Battery Voltage
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.victron_battery_voltage
    below: 12.8
  conditions: []
  actions:
  - action: notify.notify
    metadata: {}
    data:
      message: Battery low
  mode: single

- id: water_mode_state_machine_transition
  alias: Water - Apply Target Mode
  description: Apply selected water mode with sequential valve transitions.
  triggers:
  - trigger: state
    entity_id:
    - input_select.water_mode_target
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state is not none and trigger.from_state is not none and trigger.to_state.state != trigger.from_state.state }}"
  actions:
  - action: script.water_set_mode
    data:
      mode: "{{ trigger.to_state.state }}"
  mode: queued
