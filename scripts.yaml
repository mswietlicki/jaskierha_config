
water_mode_normal:
    alias: Water - Normal
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.water_mode_target
        data:
          option: Normal

water_mode_pump_filling:
    alias: Water - Pump Filling
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.water_mode_target
        data:
          option: Pump Filling

water_mode_grid_filling:
    alias: Water - Grid Filling
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.water_mode_target
        data:
          option: Grid Filling

water_mode_grid:
    alias: Water - Grid
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.water_mode_target
        data:
          option: Grid

water_set_mode:
    alias: Water - Set Mode Safely
    description: Move valves one-by-one with 5s pauses to reach selected mode.
    mode: queued
    max: 10
    fields:
      mode:
        description: Target water mode.
        example: Grid Filling
    sequence:
      - variables:
          target_mode: "{{ mode }}"
          pump_was_on: "{{ is_state('switch.water_pump_relay', 'on') }}"
          desired_tank: >-
            {% if target_mode == 'Grid' %}on
            {% else %}off
            {% endif %}
          desired_loop: >-
            {% if target_mode in ['Pump Filling', 'Grid Filling', 'Grid'] %}on
            {% else %}off
            {% endif %}
          desired_overwrite: >-
            {% if target_mode in ['Grid Filling', 'Grid'] %}on
            {% else %}off
            {% endif %}
          desired_grid: >-
            {% if target_mode in ['Pump Filling', 'Grid Filling', 'Grid'] %}on
            {% else %}off
            {% endif %}

      - action: switch.turn_off
        target:
          entity_id: switch.water_pump_relay

      # OFF phase order: Grid -> Loop -> Pump Overwrite -> Tank
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_grid', 'on') and desired_grid == 'off' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_valve_grid
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_loop', 'on') and desired_loop == 'off' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_valve_loop
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_pump_overwrite', 'on') and desired_overwrite == 'off' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_valve_pump_overwrite
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_tank', 'on') and desired_tank == 'off' }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_valve_tank
              - delay: "00:00:05"

      # ON phase order: Pump Overwrite -> Loop -> Grid -> Tank
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_pump_overwrite', 'off') and desired_overwrite == 'on' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.water_valve_pump_overwrite
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_loop', 'off') and desired_loop == 'on' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.water_valve_loop
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_grid', 'off') and desired_grid == 'on' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.water_valve_grid
              - delay: "00:00:05"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_state('switch.water_valve_tank', 'off') and desired_tank == 'on' }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.water_valve_tank
              - delay: "00:00:05"

      - action: input_select.select_option
        target:
          entity_id: input_select.water_mode_current
        data:
          option: "{{ target_mode }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode in ['Grid Filling', 'Grid'] }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_pump_relay
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ pump_was_on }}"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: switch.water_pump_relay
            default:
              - action: switch.turn_off
                target:
                  entity_id: switch.water_pump_relay