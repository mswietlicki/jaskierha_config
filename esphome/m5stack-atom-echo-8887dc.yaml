substitutions:
  name: m5stack-atom-echo-8887dc
  friendly_name: M5Stack Atom Echo
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

api:
  encryption:
    key: mbfqgtsjasGjpl4NMO5kkNw+pXD9JRXF/hAQ0VtF2LQ=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

remote_receiver:
  pin:
    # Grove signal pin on Atom Echo (primary candidate for IR receiver input)
    number: GPIO26
    inverted: true
  dump: all
  rmt_symbols: 256
  tolerance: 25%
  filter: 50us
  idle: 4ms

# Keep transmit disabled while learning/decoding remote codes.
# Enable after receiver pin/protocol is confirmed, then set to your real IR TX pin.
# remote_transmitter:
#   pin: GPIO2
#   carrier_duty_percent: 50%

