
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include_dir_merge_named scripts
scene: !include scenes.yaml

modbus: !include_dir_merge_list modbus

sensor:
  - platform: torque
    email: jaskier
    
lovelace:
  dashboards:
    victron-dashboard:
      mode: yaml
      title: Victron
      icon: mdi:flash
      show_in_sidebar: true
      filename: dashboards/victron_dashboard.yaml

input_select:
  water_mode_target:
    name: Water Mode Target
    options:
      - Normal
      - Pump Filling
      - Grid Filling
      - Grid
    initial: Normal
    icon: mdi:water-sync

  water_mode_current:
    name: Water Mode Current
    options:
      - Normal
      - Pump Filling
      - Grid Filling
      - Grid
    initial: Normal
    icon: mdi:water-check

input_boolean:
  water_heating_enabled:
    name: Water Heating Enabled
    initial: false
    icon: mdi:water-boiler

input_number:
  water_heating_target_temp:
    name: Water Heating Target Temp
    min: 30
    max: 80
    step: 0.5
    initial: 45
    unit_of_measurement: "°C"
    icon: mdi:thermometer-water

  water_heating_hysteresis:
    name: Water Heating Hysteresis
    min: 1
    max: 15
    step: 0.5
    initial: 3
    unit_of_measurement: "°C"
    icon: mdi:delta

template:
  - binary_sensor:
      - name: Water Mode Normal Selected
        unique_id: water_mode_normal_selected
        state: "{{ is_state('input_select.water_mode_target', 'Normal') }}"

      - name: Water Mode Pump Filling Selected
        unique_id: water_mode_pump_filling_selected
        state: "{{ is_state('input_select.water_mode_target', 'Pump Filling') }}"

      - name: Water Mode Grid Filling Selected
        unique_id: water_mode_grid_filling_selected
        state: "{{ is_state('input_select.water_mode_target', 'Grid Filling') }}"

      - name: Water Mode Grid Selected
        unique_id: water_mode_grid_selected
        state: "{{ is_state('input_select.water_mode_target', 'Grid') }}"

    sensor:
      - name: VE.Bus Switch Position Mode
        unique_id: victron_vebus_switch_position_mode
        state: >
          {% set mode = states('select.inverter') | lower %}
          {% if 'charger' in mode %}
            Charger Only
          {% elif 'inverter' in mode %}
            Inverter Only
          {% elif mode == 'on' %}
            On
          {% elif mode == 'off' %}
            Off
          {% else %}
            Unknown
          {% endif %}

      - name: Orion XS Input Battery State of Charge
        unique_id: orion_xs_input_battery_state_of_charge
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        availability: "{{ states('sensor.orion_xs_input_voltage') | float(none) is not none }}"
        state: >
          {% set voltage = states('sensor.orion_xs_input_voltage') | float(none) %}
          {% if voltage is none %}
            {{ none }}
          {% else %}
            {% set empty_soc_voltage = 11.8 %}
            {% set full_soc_voltage = 12.8 %}
            {% set soc = ((voltage - empty_soc_voltage) / (full_soc_voltage - empty_soc_voltage)) * 100 %}
            {{ [0, [soc, 100] | min] | max | round(0) }}
          {% endif %}

    select:
      - name: Inverter Mode
        unique_id: victron_inverter_mode_control
        state: >
          {% set mode = states('select.inverter') | lower %}
          {% if 'charger' in mode %}
            Charger Only
          {% elif 'inverter' in mode %}
            Inverter Only
          {% elif mode == 'on' %}
            On
          {% elif mode == 'off' %}
            Off
          {% else %}
            Unknown
          {% endif %}
        options: "{{ ['Charger Only', 'Inverter Only', 'On', 'Off'] }}"
        select_option:
          - service: select.select_option
            target:
              entity_id: select.inverter
            data:
              option: >
                {% set map = {
                  'Charger Only': 'charger_only',
                  'Inverter Only': 'inverter_only',
                  'On': 'on',
                  'Off': 'off'
                } %}
                {{ map.get(option, option) }}

    switch:
      - name: Inverter Enabled
        unique_id: victron_inverter_power_switch
        state: "{{ states('select.inverter') | lower == 'on' }}"
        turn_on:
          - service: select.select_option
            target:
              entity_id: select.inverter
            data:
              option: "on"
        turn_off:
          - service: select.select_option
            target:
              entity_id: select.inverter
            data:
              option: "off"
