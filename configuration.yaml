
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include_dir_merge_named scripts
scene: !include scenes.yaml

modbus: !include_dir_merge_list modbus

lovelace:
  dashboards:
    victron-dashboard:
      mode: yaml
      title: Victron
      icon: mdi:flash
      show_in_sidebar: true
      filename: dashboards/victron_dashboard.yaml

input_select:
  water_mode_target:
    name: Water Mode Target
    options:
      - Normal
      - Pump Filling
      - Grid Filling
      - Grid
    initial: Normal
    icon: mdi:water-sync

  water_mode_current:
    name: Water Mode Current
    options:
      - Normal
      - Pump Filling
      - Grid Filling
      - Grid
    initial: Normal
    icon: mdi:water-check

template:
  - binary_sensor:
      - name: Water Mode Normal Selected
        unique_id: water_mode_normal_selected
        state: "{{ is_state('input_select.water_mode_target', 'Normal') }}"

      - name: Water Mode Pump Filling Selected
        unique_id: water_mode_pump_filling_selected
        state: "{{ is_state('input_select.water_mode_target', 'Pump Filling') }}"

      - name: Water Mode Grid Filling Selected
        unique_id: water_mode_grid_filling_selected
        state: "{{ is_state('input_select.water_mode_target', 'Grid Filling') }}"

      - name: Water Mode Grid Selected
        unique_id: water_mode_grid_selected
        state: "{{ is_state('input_select.water_mode_target', 'Grid') }}"

    sensor:
      - name: VE.Bus Switch Position Mode
        unique_id: victron_vebus_switch_position_mode
        state: >
          {% set mode = states('sensor.victron_vebus_switch_position') | int(-1) %}
          {% if mode == 1 %}
            Charger Only
          {% elif mode == 2 %}
            Inverter Only
          {% elif mode == 3 %}
            On
          {% elif mode == 4 %}
            Off
          {% else %}
            Unknown
          {% endif %}

    select:
      - name: Inverter Mode
        unique_id: victron_inverter_mode_control
        state: >
          {% set mode = states('sensor.victron_vebus_switch_position') | int(-1) %}
          {% if mode == 1 %}
            Charger Only
          {% elif mode == 2 %}
            Inverter Only
          {% elif mode == 3 %}
            On
          {% elif mode == 4 %}
            Off
          {% else %}
            Unknown
          {% endif %}
        options:
          - Charger Only
          - Inverter Only
          - On
          - Off
        select_option:
          - action: modbus.write_register
            data:
              hub: victron_cerbo
              slave: 227
              address: 33
              value: >
                {% set mode_map = {
                  'Charger Only': 1,
                  'Inverter Only': 2,
                  'On': 3,
                  'Off': 4
                } %}
                {{ mode_map.get(option, 4) }}
