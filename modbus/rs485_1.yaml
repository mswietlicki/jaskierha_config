- name: rs485_1
  type: tcp
  host: 192.168.88.18
  port: 502
  delay: 1
  timeout: 1

  sensors:
    - name: "Boiler Temp"
      unique_id: boiler_temp
      slave: 50
      address: 160        # 0x00A0
      input_type: holding
      data_type: int16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: "Water Temp"
      unique_id: water_temp
      slave: 50
      address: 161        # 0x00A1
      input_type: holding
      data_type: int16
      scale: 0.1
      precision: 1
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

  switches:
    - name: "Water Pump Relay"
      unique_id: water_pump_relay
      slave: 32
      address: 0
      write_type: coil

    - name: "Gray Water Valve"
      unique_id: gray_water_valve
      slave: 32
      address: 1
      write_type: coil

    - name: "Water Valve Tank"
      unique_id: water_valve_tank
      slave: 33
      address: 0
      write_type: coil

    - name: "Water Valve Loop"
      unique_id: water_valve_loop
      slave: 33
      address: 1
      write_type: coil

    - name: "Water Valve Pump Overwrite"
      unique_id: water_valve_pump_overwrite
      slave: 33
      address: 2
      write_type: coil

    - name: "Water Valve Grid"
      unique_id: water_valve_grid
      slave: 33
      address: 3
      write_type: coil
